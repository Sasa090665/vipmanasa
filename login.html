<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - VIP Royal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="signup-container">
    <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
    <form id="loginForm">
      <div class="input-group">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
        <div class="error" id="loginEmailError"></div>
      </div>
      <div class="input-group">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
        <div class="error" id="loginPasswordError"></div>
      </div>
      <button type="submit">دخول</button>
    </form>
    <p>ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></p>
  </div>
  <script src="login.js"></script>
</body>
</html>
