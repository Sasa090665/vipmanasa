<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب جديد - VIP Royal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="signup.css">
  <!-- تحميل مكتبة Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="signup-container">
    <h2><i class="fas fa-user-plus"></i> إنشاء حساب جديد</h2>
    <form id="signupForm">
      <div class="input-group">
        <input type="text" id="fullname" placeholder="الاسم الثلاثي" required>
        <div class="error" id="nameError"></div>
      </div>
      <div class="input-group">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <div class="error" id="emailError"></div>
      </div>
      <div class="input-group">
        <input type="text" id="nationalId" placeholder="الرقم القومي" required>
        <div class="error" id="nationalIdError"></div>
      </div>
      <div class="input-group">
        <input type="text" id="studentPhone" placeholder="رقم الطالب" required>
        <div class="error" id="studentPhoneError"></div>
      </div>
      <div class="input-group">
        <input type="text" id="parentPhone" placeholder="رقم ولي الأمر" required>
        <div class="error" id="parentPhoneError"></div>
      </div>
      <div class="input-group">
        <select id="governorate" required>
          <option value="">اختر المحافظة</option>
          <option value="القاهرة">القاهرة</option>
          <option value="الجيزة">الجيزة</option>
          <option value="الإسكندرية">الإسكندرية</option>
          <option value="الشرقية">الشرقية</option>
          <option value="الدقهلية">الدقهلية</option>
          <option value="البحيرة">البحيرة</option>
          <option value="الغربية">الغربية</option>
          <option value="المنوفية">المنوفية</option>
          <option value="القليوبية">القليوبية</option>
          <option value="كفر الشيخ">كفر الشيخ</option>
          <option value="الفيوم">الفيوم</option>
          <option value="بني سويف">بني سويف</option>
          <option value="المنيا">المنيا</option>
          <option value="أسيوط">أسيوط</option>
          <option value="سوهاج">سوهاج</option>
          <option value="قنا">قنا</option>
          <option value="الأقصر">الأقصر</option>
          <option value="أسوان">أسوان</option>
          <option value="دمياط">دمياط</option>
          <option value="بورسعيد">بورسعيد</option>
          <option value="الإسماعيلية">الإسماعيلية</option>
          <option value="السويس">السويس</option>
          <option value="مطروح">مطروح</option>
          <option value="شمال سيناء">شمال سيناء</option>
          <option value="جنوب سيناء">جنوب سيناء</option>
          <option value="الوادي الجديد">الوادي الجديد</option>
          <option value="البحر الأحمر">البحر الأحمر</option>
        </select>
        <div class="error" id="governorateError"></div>
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <div class="error" id="passwordError"></div>
      </div>
      <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
        <div class="error" id="confirmPasswordError"></div>
      </div>
      <button type="submit">تسجيل</button>
    </form>
    <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
  </div>
  <script src="signup.js"></script>
</body>
</html>
